services:
  # Backend — Node.js API
  - type: web
    name: payflow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    nodeVersion: 18
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend — React + Vite (Static Site)
  - type: web
    name: payflow-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
